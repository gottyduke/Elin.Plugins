name: Elin Plugin CI Deploy

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
      plugin_path:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      release_name_prefix:
        required: true
        type: string
      include_cwl:
        required: false
        type: boolean
        default: true
      prerelease:
        required: false
        type: boolean
        default: false
      artifact_name_prefix:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-and-upload:
    name: Build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        version: [nightly, stable]
        configuration: [Debug, Release]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.include_cwl && 'CustomWhateverLoader/' || '' }}${{ inputs.plugin_path }}/
            Directory.Build.props
            global.json
          sparse-checkout-cone-mode: false

      - name: Checkout Deps
        uses: actions/checkout@v6
        with:
          path: ${{ matrix.version }}
          ref: ${{ matrix.version }}
          repository: gottyduke/Elin.Plugins.BuildDeps
          ssh-key: ${{ secrets.DEPS_DEPLOY_KEY }}

      - name: Setup Deps Tag
        id: deps
        shell: pwsh
        run: |
          pushd ${{ github.workspace }}\${{ matrix.version }}
          $tag = git describe --tags --abbrev=0 ${{ matrix.version }}
          popd
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup DotNet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10
          cache: true
          cache-dependency-path: |
            ${{ inputs.include_cwl && format('{0}\CustomWhateverLoader\packages.lock.json', github.workspace) || '' }}
            ${{ github.workspace }}\${{ inputs.plugin_path }}\packages.lock.json

      - name: Setup Packages
        run: |
          ${{ inputs.include_cwl && format('dotnet restore {0}\CustomWhateverLoader\ --locked-mode', github.workspace) || '' }}
          dotnet restore ${{ github.workspace }}\${{ inputs.plugin_path }}\ --locked-mode

      - name: Build
        id: build
        env:
          ElinGamePath: ${{ github.workspace }}\${{ matrix.version }}
        shell: pwsh
        run: |
          $cfgBase = '${{ matrix.configuration }}'
          $config = if ('${{ matrix.version }}' -eq 'nightly') { "${cfgBase}Nightly" } else { $cfgBase }

          $outDir = "${{ github.workspace }}\out\${{ matrix.version }}-${{ matrix.configuration }}"
          ${{ inputs.include_cwl && format('dotnet build {0}\CustomWhateverLoader\CustomWhateverLoader.csproj -o {0}\{1}\Package\Mod_CustomWhateverLoader -c $config --no-restore', github.workspace, matrix.version) || '' }}
          dotnet build ${{ github.workspace }}\${{ inputs.plugin_path }}\${{ inputs.plugin_name }}.csproj -o $outDir -c $config --no-restore

          $dllPath = Join-Path -Path $outDir -ChildPath "${{ inputs.plugin_name }}.dll"
          $fileVersion = (Get-Item -Path $dllPath).VersionInfo.FileVersion
          $fileVersionShort = $fileVersion.Split('.')[0..2] -join '.'
          $debugSuffix = if ('${{ matrix.configuration }}' -eq 'Debug') { 'debug' } else { 'release' }

          echo "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          echo "file_version_short=$fileVersionShort" >> $env:GITHUB_OUTPUT
          echo "file_name=${{ inputs.artifact_name_prefix }}-ci-builds-$fileVersion-${{ steps.deps.outputs.tag }}-$debugSuffix" >> $env:GITHUB_OUTPUT
          echo "out_dir=$outDir" >> $env:GITHUB_OUTPUT
          echo "debug_suffix=$debugSuffix" >> $env:GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.file_name }}
          path: ${{ steps.build.outputs.out_dir }}

      - name: Prepare Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        id: artifact
        shell: pwsh
        run: |
          $source = "${{ steps.build.outputs.out_dir }}"
          $debugSuffix = "${{ steps.build.outputs.debug_suffix }}"
          $destination = "${{ steps.build.outputs.out_dir }}\${{ inputs.artifact_name_prefix }}-ci-builds-${{ steps.deps.outputs.tag }}-$debugSuffix.zip"

          Compress-Archive -Path "$source\*" -DestinationPath $destination -Force
          $path = $destination -Replace '\\', '/'
      
          $tag = "${{ inputs.tag_prefix }}-${{ steps.build.outputs.file_version_short }}"

          gh api repos/${{ github.repository }}/git/refs/tags/$tag -q "if .object then true else false" 2>$null
          if ($LASTEXITCODE -eq 0) { gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/$tag }
          if (git tag -l $tag) { git tag -d $tag }
          
          $lastTag = git describe --tags --abbrev=0 --match="${{ inputs.tag_prefix }}-*"
          $lastTagSha = git rev-parse $lastTag
          $commits = @(git log "$($lastTag)..HEAD" --date=format:"%y-%m-%d %H:%M" --pretty=format:"- %cd %h %s" -- ${{ inputs.plugin_path }} |
            ? { $_ -notmatch "cleanup" })

          $changelog = @(
            "Last Tag ($lastTag): $lastTagSha"
            ""
          )
          $changelog += $commits

          $changelog | Set-Content -Path "${{ github.workspace }}\CHANGELOG.txt" -Encoding utf8
          echo "artifact_path=$path" >> $env:GITHUB_OUTPUT

      - name: Create or Update Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_prefix }}-${{ steps.build.outputs.file_version_short }}
          name: ${{ inputs.release_name_prefix }} ${{ steps.build.outputs.file_version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          body_path: ${{ github.workspace }}\CHANGELOG.txt
          files: ${{ steps.artifact.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}