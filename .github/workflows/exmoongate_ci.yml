name: Expanded Moongate Elin CI Deploy

on:
  push:
    branches: ["*"]
    paths: ["ExpandedMoongate/ExpandedMoongate/**"]
  pull_request_target:
    paths: ["ExpandedMoongate/ExpandedMoongate/**"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/build_plugin_ci.yml
    secrets: inherit
    with:
      plugin_name: ExpandedMoongate
      plugin_path: ExpandedMoongate\ExpandedMoongate
      tag_prefix: EXM
      release_name_prefix: "Expanded Moongate"
      artifact_name_prefix: exmoongate
      include_cwl: false
      prerelease: false