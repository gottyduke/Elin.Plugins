name: Animated Custom Sprites CI Deploy

on:
  push:
    branches: ["*"]
    paths: ["AnimatedCustomSprites/**"]
  pull_request_target:
    paths: ["AnimatedCustomSprites/**"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-upload:
    name: Build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        version: [nightly, stable]
        configuration: [Debug, Release]

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            CustomWhateverLoader/
            AnimatedCustomSprites/
            Directory.Build.props
            global.json
          sparse-checkout-cone-mode: false

      - name: Checkout Deps
        uses: actions/checkout@v6
        with:
          path: ${{ matrix.version }}
          ref: ${{ matrix.version }}
          repository: gottyduke/Elin.Plugins.BuildDeps
          ssh-key: ${{ secrets.DEPS_DEPLOY_KEY }}

      - name: Setup DotNet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10
          cache: true
          cache-dependency-path:  |
            ${{ github.workspace }}\CustomWhateverLoader\packages.lock.json
            ${{ github.workspace }}\AnimatedCustomSprites\packages.lock.json

      - name: Setup Packages
        run: |
          dotnet restore ${{ github.workspace }}\CustomWhateverLoader\ --locked-mode
          dotnet restore ${{ github.workspace }}\AnimatedCustomSprites\ --locked-mode

      - name: Build
        id: build
        env:
          ElinGamePath: ${{ github.workspace }}\${{ matrix.version }}
        shell: pwsh
        run: |
          $cfgBase = '${{ matrix.configuration }}'
          $config = if ('${{ matrix.version }}' -eq 'nightly') { "${cfgBase}Nightly" } else { $cfgBase }

          $outDir = "${{ github.workspace }}\out\${{ matrix.version }}-${{ matrix.configuration }}"
          dotnet build ${{ github.workspace }}\CustomWhateverLoader\CustomWhateverLoader.csproj -o ${{ github.workspace }}\${{ matrix.version }}\Package\Mod_CustomWhateverLoader -c $config --no-restore
          dotnet build ${{ github.workspace }}\AnimatedCustomSprites\AnimatedCustomSprites.csproj -o $outDir -c $config --no-restore

          $dllPath = Join-Path -Path $outDir -ChildPath "AnimatedCustomSprites.dll"
          $fileVersion = (Get-Item -Path $dllPath).VersionInfo.FileVersion
          $fileVersionShort = $fileVersion.Split('.')[0..2] -join '.'
          $debugSuffix = if ('${{ matrix.configuration }}' -eq 'Debug') { '-debug' } else { '' }

          echo "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          echo "file_version_short=$fileVersionShort" >> $env:GITHUB_OUTPUT
          echo "file_name=acs-ci-builds-$fileVersion-${{ matrix.version }}$debugSuffix" >> $env:GITHUB_OUTPUT
          echo "out_dir=$outDir" >> $env:GITHUB_OUTPUT
          echo "debug_suffix=$debugSuffix" >> $env:GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.file_name }}
          path: ${{ steps.build.outputs.out_dir }}

      - name: Prepare Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        id: artifact
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = "${{ steps.build.outputs.out_dir }}"
          $debugSuffix = "${{ steps.build.outputs.debug_suffix }}"
          $destination = "${{ steps.build.outputs.out_dir }}\acs-ci-builds-${{ matrix.version }}$debugSuffix.zip"

          Compress-Archive -Path "$source\*" -DestinationPath $destination -Force
          $path = $destination -Replace '\\', '/'

          $tag = "ACS-${{ steps.build.outputs.file_version_short }}"

          gh api repos/${{ github.repository }}/git/refs/tags/$tag -q "if .object then true else false" 2>$null
          if ($LASTEXITCODE -eq 0) { gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/$tag }
          if (git tag -l $tag) { git tag -d $tag }
          
          $lastTag = git describe --tags --abbrev=0 --match="ACS-*"
          $lastTagSha = git rev-parse $lastTag
          $commits = @(git log "$($lastTag)..HEAD" --date=format:"%y-%m-%d %H:%M" --pretty=format:"%cd;%h;%s" -- AnimatedCustomSprites/ |
            ? { $_ -notmatch "cleanup" } |
            % {
                $parts = $_ -split ';', 3
                "- $($parts[0]) $($parts[2]) $($parts[1])"
            })

          $changelog = @(
            "Last Tag ($lastTag): $lastTagSha"
            ""
          )
          $changelog += $commits

          $changelog | Set-Content -Path "${{ github.workspace }}\CHANGELOG.txt" -Encoding utf8
          echo "artifact_path=$path" >> $env:GITHUB_OUTPUT

      - name: Create or Update Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ACS-${{ steps.build.outputs.file_version_short }}
          name: Animated Custom Sprites ${{ steps.build.outputs.file_version }}${{ steps.build.outputs.debug_suffix }}
          prerelease: false
          generate_release_notes: false
          body_path: ${{ github.workspace }}\CHANGELOG.txt
          files: ${{ steps.artifact.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}