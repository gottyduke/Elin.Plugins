name: Elin Together CI Deploy

on:
  push:
    branches: ["*"]
    paths: ["ElinTogether/ElinTogether/**"]
  pull_request_target:
    paths: ["ElinTogether/ElinTogether/**"]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/build_plugin_ci.yml
    with:
      plugin_name: ElinTogether
      plugin_path: ElinTogether/ElinTogether
      tag_prefix: ETL
      release_name_prefix: "Elin Together - Preview"
      artifact_name_prefix: emp
      include_cwl: true
      prerelease: true